<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Tickets | N.D.H Cinemas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body>

<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">N.D.H Cinemas</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
  <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
<li class="nav-item"><a class="nav-link active" href="bookings.html">Book Tickets</a></li>
<li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
</ul>
</div>
</div>
</nav>
</header>

<main class="container my-5">
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card bg-dark text-light">
<div class="card-body p-4">

<h2 class="text-danger text-center mb-4">Book Your Movie Tickets</h2>

<form>
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" id="name" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Select Movie</label>
<select id="movie" class="form-select">
<option>Aladdin</option>
<option>Captain Marvel</option>
<option>WMD Featured Movie</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Tickets</label>
<input id="tickets" type="number" value="1" min="1" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Seat Type</label>
<select id="seat" class="form-select">
<option value="80">Standard P80</option>
<option value="120">VIP P120</option>
</select>
</div>

<button type="button" onclick="calculateTotal()" class="btn btn-danger w-100">
Calculate & Book
</button>
</form>

<div id="bookingResult" class="alert alert-success mt-4 d-none"></div>

</div>
</div>
</div>
</div>
</main>

<footer>
<p>&copy; 2026 N.D.H Cinemas • Gaborone, Botswana</p>
</footer>

<script>
function calculateTotal(){
let name=document.getElementById('name').value;
let tickets=parseInt(document.getElementById('tickets').value);
let seat=parseInt(document.getElementById('seat').value);
let total=tickets*seat;
let result=document.getElementById('bookingResult');
result.classList.remove('d-none');
result.innerHTML='Booking confirmed for '+name+'<br>Total Price: P'+total;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
