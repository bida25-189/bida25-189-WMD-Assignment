<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback | N.D.H Cinemas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>We would love to hear about you visit at N.D.H Cinemas</h1> 
                   <h2>Please leave a comment</h2>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">N.D.H Cinemas</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
<li class="nav-item"><a class="nav-link" href="bookings.html">Book Tickets</a></li>
<li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
</ul>
</div>
</div>
</nav>
</header>
<main class="container my-5">
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card bg-dark text-light">
<div class="card-body p-4">

<h2 class="text-danger text-center mb-4">Customer Feedback</h2>

<form>
<div class="mb-3">
<label class="form-label">Your Name</label>
<input id="customerName" class="form-control" type="text">
</div>

<div class="mb-3">
<label class="form-label">Rate Experience</label>
<select id="rating" class="form-select">
<option>Excellent</option>
<option>Very Good</option>
<option>Good</option>
<option>Fair</option>
<option>Poor</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Comments</label>
<textarea class="form-control" rows="5"></textarea>
</div>

<button type="button" onclick="submitFeedback()" class="btn btn-danger w-100">
Submit Feedback
</button>
</form>

<div id="message" class="alert alert-success mt-4 d-none"></div>

</div>
</div>
</div>
</div>
</main>

<footer>
<p>&copy; 2026 N.D.H Cinemas • Gaborone, Botswana</p>
</footer>
<script>
function submitFeedback(){
let name=document.getElementById('customerName').value;
let rating=document.getElementById('rating').value;
let box=document.getElementById('message');
box.classList.remove('d-none');
box.innerHTML='Thank you '+name+'! Your '+rating+' feedback has been received.';
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
